<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediction</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 900px;
      height: 520px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    /* LEFT SIDE */
    .left {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .left img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* RIGHT SIDE */
    .right {
      background: #E8A534;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem;
    }

    /* UPLOAD BOX */
    .upload-box {
      width: 100%;
      background: rgba(255, 255, 255, 0.25);
      border: 2px dashed rgba(255, 255, 255, 0.7);
      border-radius: 14px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      cursor: pointer;
      padding: 1.5rem;
      transition: background 0.2s;
    }

    .upload-box:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .upload-box.dragover {
      background: rgba(255, 255, 255, 0.45);
      border-color: white;
    }

    .upload-icon {
      font-size: 40px;
    }

    .upload-text {
      color: white;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }

    .upload-sub {
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
    }

    .browse-btn {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 8px;
      padding: 6px 18px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .browse-btn:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .preview-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      display: none;
    }

    /* PREDICT BUTTON */
    .predict-btn {
      background: white;
      color: #C47A1A;
      border: none;
      border-radius: 10px;
      padding: 13px 0;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: transform 0.1s, background 0.2s;
    }

    .predict-btn:hover {
      background: #f5f5f5;
    }

    .predict-btn:active {
      transform: scale(0.98);
    }

    .predict-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* RESULT BOX */
    .result {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      padding: 10px 20px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      width: 100%;
      display: none;
    }

    .result.show {
      display: block;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LEFT: image of cat and dog -->
  <div class="left"></div>

  <!-- RIGHT: upload + predict -->
  <div class="right">

    <input type="file" id="fileInput" accept="image/*">

    <div class="upload-box" id="dropZone">
      <img class="preview-img" id="preview" alt="uploaded image preview">
      <span class="upload-icon" id="uploadIcon">☁️</span>
      <p class="upload-text" id="uploadText">Drag your image here or</p>
      <button class="browse-btn" id="browseBtn">Browse</button>
      <p class="upload-sub" id="uploadSub">Supports JPG, PNG</p>
    </div>

    <button class="predict-btn" id="predictBtn">Who am I?</button>

    <div class="result" id="result"></div>

  </div>
</div>

<script>
  const dropZone    = document.getElementById('dropZone');
  const fileInput   = document.getElementById('fileInput');
  const preview     = document.getElementById('preview');
  const uploadIcon  = document.getElementById('uploadIcon');
  const uploadText  = document.getElementById('uploadText');
  const uploadSub   = document.getElementById('uploadSub');
  const browseBtn   = document.getElementById('browseBtn');
  const predictBtn  = document.getElementById('predictBtn');
  const resultDiv   = document.getElementById('result');

  // Show image preview after upload
  function showPreview(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadIcon.style.display = 'none';
      uploadText.style.display = 'none';
      uploadSub.style.display  = 'none';
      browseBtn.style.display  = 'none';
      resultDiv.classList.remove('show');
      resultDiv.textContent = '';
    };
    reader.readAsDataURL(file);
  }

  // Browse button
  browseBtn.addEventListener('click', e => {
    e.stopPropagation();
    fileInput.click();
  });

  fileInput.addEventListener('change', e => showPreview(e.target.files[0]));

  // Click anywhere on upload box to browse
  dropZone.addEventListener('click', () => fileInput.click());

  // Drag and drop
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    showPreview(e.dataTransfer.files[0]);
  });

  // Predict button
  // When backend is ready, replace the setTimeout below with a fetch() call to Flask
  predictBtn.addEventListener('click', async () => {

    if (preview.style.display === 'none' || !preview.src) {
      resultDiv.textContent = 'Please upload an image first!';
      resultDiv.classList.add('show');
      return;
    }

    predictBtn.textContent = 'Analyzing...';
    predictBtn.disabled = true;

    /*
    =============================================
    WHEN BACKEND IS READY, REPLACE THIS SECTION:
    =============================================

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const response = await fetch('http://127.0.0.1:5000/predict', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();
    resultDiv.textContent = data.result;
    resultDiv.classList.add('show');

    =============================================
    */

    // Placeholder until backend is connected
    setTimeout(() => {
      resultDiv.textContent = 'Backend not connected yet!';
      resultDiv.classList.add('show');
      predictBtn.textContent = 'Who am I?';
      predictBtn.disabled = false;
    }, 1000);

  });
</script>

</body>
</html>
